# Default values for rstuf-worker.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

strategy: {}
  # type: RollingUpdate
  # rollingUpdate:
  #   maxSurge: 1
  #   maxUnavailable: 0

image:
  repository: ghcr.io/repository-service-tuf/repository-service-tuf-worker
  pullPolicy: IfNotPresent
  tag: ""

livenessProbe:
  exec:
    # bash is needed to replace the environment variable
    command:
      [
        "bash",
        "-c",
        "RSTUF_WORKER_ID=$HOSTNAME celery -A app inspect ping rstuf@$HOSTNAME,rstuf_jobs@$HOSTNAME",
      ]
  initialDelaySeconds: 30
  periodSeconds: 60
  timeoutSeconds: 10
readinessProbe:
  exec:
    command:
      [
        "/usr/local/bin/python",
        "-c",
        '"import os;os.environ[''RSTUF_WORKER_ID'']=os.environ[''HOSTNAME''];from app import app;exit(0 if os.environ[''HOSTNAME''] in '',''.join(app.control.inspect(app=app).stats().keys()) else 1)"',
      ]

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

storage:
  type: "AWSS3"             # AWSS3 or localStorage
  storagePath: ""           # required only when using `storageBackend` as "localStorage"
  s3Bucket: "tuf-metadata"  # Deprecated, kept for backward compatibility. Will be removed in a future release. Use `aws.s3Bucket` instead.
aws:
  endpoint: ""
  region: ""
  s3Bucket: ""
  accessKey: "s3-keyid"
  # accessKeyFrom:
  #   valueFrom:
  #     secretKeyRef:
  #       name: rstuf-s3-rw
  #       key: ACCESS_KEY
  secretKey: "s3-access-key"
  # secretKeyFrom:
  #   valueFrom:
  #     secretKeyRef:
  #       name: rstuf-s3-rw
  #       key: SECRET_KEY
  # Note: direct value takes priority over *From
  s3_object_acl: ""  # default is public-read
gcp:
  # Use applicationCredentials as base64
  applicationCredentials: ""

backend:
  brokerServer: "redis://redis"
  redisServer: "redis://redis"
  # redisPort default is 6379
  redisPort: ""
  # redisDbResult default is 0
  redisDbResult: ""
  # redisDbSettings default is 1
  redisDbSettings: ""
  # To use dbServerFrom, set dbServer: ""
  dbServer: "postgresql://postgres:password@postgres:5432"
  # dbServerFrom:
  #   valueFrom:
  #     secretKeyRef:
  #       name: rstuf-database
  #       key: RSTUF_DB_SERVER
  # dbUser and dbPassword are required when dbServer is not a full URL with credentials
  dbUser: ""
  # dbUserFrom:
  #   valueFrom:
  #     secretKeyRef:
  #       name: rstuf-database
  #       key: RSTUF_DB_USER
  dbPassword: ""
  # dbPasswordFrom:
  #   valueFrom:
  #     secretKeyRef:
  #       name: rstuf-database
  #       key: RSTUF_DB_PASSWORD
  # Note: direct value takes priority over *From
  # Database keepalive settings
  dbKeepAlive: false
  dbKeepAliveIdle: 30
  dbKeepAliveInterval: 5
  dbKeepAliveCount: 3
  # lockTimeOut default 60 seconds
  lockTimeOut: ""

# Additional environment variables
extraEnv: []
  # - name: AWS_REQUEST_CHECKSUM_CALCULATION
  #   value: "when_required"

onlineKeyDir: "/run/secrets"
onlineKeyFile: []
  # Variant 1: create secret from pem
  # - keyid: 0d9d3d4bad91c455bc03921daa95774576b86625ac45570d0cac025b08e65043
  #   pem: LS0tLS1CRUdJTi(...)
  # Variant 2: use existing secret
  # - keyid: 0d9d3d4bad91c455bc03921daa95774576b86625ac45570d0cac025b08e65043
  #   secretName: my-secret
  #   secretKey: 0d9d3d4bad91c455bc03921daa95774576b86625ac45570d0cac025b08e65043  # defaults to keyid

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

s3Gateway:
  enabled: false
  replicaCount: 1
  strategy:
    type: RollingUpdate
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  imagePullSecrets: []
  image:
    registry: docker.io
    repository: nginxinc/nginx-s3-gateway
    tag: "unprivileged-oss-20260413"
    pullPolicy: IfNotPresent
  allowDirectoryList: false
  proxyCacheValid:
    ok: "0"
    notFound: "0"
    forbidden: "0"
  awsSigsVersion: 4
  s3Style: "default"
  s3Endpoint: ""
  s3ServerPort: "443"
  s3ServerProto: "https"
  # Minimal required: read-only S3 credentials
  accessKey: ""
  # accessKeyFrom:
  #   valueFrom:
  #     secretKeyRef:
  #       name: rstuf-s3-ro
  #       key: ACCESS_KEY
  secretKey: ""
  # secretKeyFrom:
  #   valueFrom:
  #     secretKeyRef:
  #       name: rstuf-s3-ro
  #       key: SECRET_KEY
  # Note: direct value takes priority over *From
  extraEnv: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      port: http
      path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      port: http
      path: /health
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  podSecurityContext: {}
  podAnnotations: {}
  podLabels: {}
  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automount: false
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
    annotations: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: rstuf.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
