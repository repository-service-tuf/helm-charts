{{- if and (and .Values.s3Gateway.enabled (eq .Values.storage.type "AWSS3")) .Values.s3Gateway.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "rstuf-worker.s3GatewayFullname" . }}
  {{- with .Values.s3Gateway.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "rstuf-worker.s3GatewayLabels" . | nindent 4 }}
spec:
  {{- if .Values.s3Gateway.ingress.className }}
  ingressClassName: {{ .Values.s3Gateway.ingress.className }}
  {{- end }}
  {{- if .Values.s3Gateway.ingress.tls }}
  tls:
    {{- range .Values.s3Gateway.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.s3Gateway.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "rstuf-worker.s3GatewayFullname" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
